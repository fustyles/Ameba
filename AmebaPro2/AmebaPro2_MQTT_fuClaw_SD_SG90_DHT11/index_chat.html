<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fuClaw — Gemini Chat</title>
<style>
  :root {
    --font-main: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
    --font-mono: 'Courier New', Courier, monospace;
    --bg:        #f5f7ff;
    --surface:   #ffffff;
    --surface2:  #f0f3ff;
    --border:    #e2e8ff;
    --accent:    #4f6ef7;
    --accent2:   #7c3aed;
    --text:      #1a1d2e;
    --text2:     #4a5270;
    --text3:     #9098b8;
    --success:   #10b981;
    --user-bg:   linear-gradient(135deg, #4f6ef7, #7c3aed);
    --ai-bg:     #ffffff;
    --radius:    16px;
    --header-h:  64px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 780px;
    margin: 0 auto;
    background: var(--bg);
  }

  /* ── header ── */
  .header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 1px 12px rgba(79,110,247,.06);
  }

  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #4f6ef7, #7c3aed);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(79,110,247,.3);
    position: relative; overflow: hidden;
  }
  .header-logo::before {
    content: '';
    position: absolute; inset: 0;
    background: conic-gradient(transparent 30%, rgba(255,255,255,.2) 50%, transparent 70%);
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .header-logo svg { position: relative; z-index: 1; }

  .header-title {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--text);
  }
  .header-sub {
    font-size: .72rem;
    color: var(--text3);
    margin-top: 1px;
  }

  .header-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .72rem;
    color: var(--text3);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    animation: blink 2.5s ease-in-out infinite;
  }
  .status-dot.thinking {
    background: #f59e0b;
    animation: pulse-dot .8s ease-in-out infinite;
  }
  @keyframes blink     { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

  /* ── messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── bubble ── */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msg-in .25s ease;
  }
  @keyframes msg-in {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg.user { align-items: flex-end; }
  .msg.ai   { align-items: flex-start; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .msg.user .msg-row { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    flex-shrink: 0;
    margin-bottom: 2px;
    font-family: var(--font-main);
  }
  .avatar.user-av { background: linear-gradient(135deg, #4f6ef7, #7c3aed); color: white; }
  .avatar.ai-av   { background: linear-gradient(135deg, #06b6d4, #4f6ef7); color: white; }

  .bubble {
    max-width: min(72%, 560px);
    padding: 11px 15px;
    border-radius: 16px;
    font-size: .9rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--font-main);
  }
  .msg.user .bubble {
    background: var(--user-bg);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(79,110,247,.3);
  }
  .msg.ai .bubble {
    background: var(--ai-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }

  .msg-time {
    font-size: .65rem;
    color: var(--text3);
    padding: 0 4px;
    font-family: var(--font-mono);
  }

  /* ── typing indicator ── */
  .typing-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 13px 16px;
    display: flex; gap: 5px; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .typing-bubble span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce .9s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: .15s; }
  .typing-bubble span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); }
    30%          { transform:translateY(-6px); }
  }

  /* ── empty state ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
    text-align: center;
    padding-bottom: 40px;
    pointer-events: none;
  }
  .empty-icon {
    width: 64px; height: 64px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }
  .empty-title { font-size: .95rem; font-weight: 500; color: var(--text2); }
  .empty-hint  { font-size: .78rem; line-height: 1.6; max-width: 240px; }

  /* ── input area ── */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px 16px;
    flex-shrink: 0;
    box-shadow: 0 -4px 20px rgba(79,110,247,.05);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,110,247,.1);
    background: white;
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-main);
    font-size: .9rem;
    color: var(--text);
    line-height: 1.55;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
    padding: 0;
  }
  textarea::placeholder { color: var(--text3); }
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .15s, box-shadow .15s, opacity .15s;
    box-shadow: 0 4px 12px rgba(79,110,247,.35);
  }
  .send-btn:hover   { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79,110,247,.45); }
  .send-btn:active  { transform: translateY(0); opacity: .85; }
  .send-btn:disabled{ opacity: .4; cursor: not-allowed; transform: none; }

  .input-hint {
    margin-top: 7px;
    font-size: .67rem;
    color: var(--text3);
    text-align: center;
    font-family: var(--font-main);
  }
  kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: .65rem;
    color: var(--text2);
  }

  /* ── error toast ── */
  .err-toast {
    display: none;
    position: fixed;
    bottom: 100px;
    left: 50%; transform: translateX(-50%);
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 10px;
    padding: 9px 18px;
    font-size: .8rem;
    font-family: var(--font-main);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    animation: fade-up .25s ease;
  }
  @keyframes fade-up {
    from { opacity:0; transform:translateX(-50%) translateY(6px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }
</style>
</head>
<body>

<div class="shell">

  <div class="header">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="9"  r="4" fill="white" opacity=".95"/>
        <circle cx="7"  cy="20" r="3" fill="white" opacity=".8"/>
        <circle cx="21" cy="20" r="3" fill="white" opacity=".8"/>
        <line x1="14" y1="13" x2="7"  y2="17" stroke="white" stroke-width="1.5" opacity=".7"/>
        <line x1="14" y1="13" x2="21" y2="17" stroke="white" stroke-width="1.5" opacity=".7"/>
        <line x1="7"  y1="20" x2="21" y2="20" stroke="white" stroke-width="1.5" opacity=".4"/>
      </svg>
    </div>
    <div>
      <div class="header-title">fuClaw</div>
      <div class="header-sub">Gemini AI Agent</div>
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">&#10022;</div>
      <div class="empty-title">開始與 Gemini 對話</div>
      <div class="empty-hint">輸入訊息後按送出<br>fuClaw 將呼叫 Gemini AI</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="msgInput"
        placeholder="輸入訊息… (Shift+Enter 換行)"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送出">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">
      <kbd>Enter</kbd> 送出 &nbsp;&#183;&nbsp; <kbd>Shift</kbd>+<kbd>Enter</kbd> 換行
    </div>
  </div>

</div>

<div class="err-toast" id="errToast"></div>

<script>
  var messagesEl = document.getElementById('messages');
  var inputEl    = document.getElementById('msgInput');
  var sendBtn    = document.getElementById('sendBtn');
  var emptyState = document.getElementById('emptyState');
  var statusDot  = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  var isWaiting  = false;

  inputEl.addEventListener('input', function() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function nowStr() {
    var d  = new Date();
    var hh = ('0' + d.getHours()).slice(-2);
    var mm = ('0' + d.getMinutes()).slice(-2);
    var ss = ('0' + d.getSeconds()).slice(-2);
    return hh + ':' + mm + ':' + ss;
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function appendMsg(role, text, time, isHtml) {
    if (emptyState) emptyState.style.display = 'none';

    var msg = document.createElement('div');
    msg.className = 'msg ' + role;

    var avatarChar = role === 'user' ? 'U' : 'AI';
    var avatarCls  = role === 'user' ? 'user-av' : 'ai-av';
	
	var content = isHtml ? text : escHtml(text);

    msg.innerHTML =
      '<div class="msg-row">' +
        '<div class="avatar ' + avatarCls + '">' + avatarChar + '</div>' +
        '<div class="bubble">' + content + '</div>' +
      '</div>' +
      '<div class="msg-time">' + time + '</div>';

    messagesEl.appendChild(msg);
    scrollBottom();
  }

  function showTyping() {
    var wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typingMsg';
    wrap.innerHTML =
      '<div class="msg-row">' +
        '<div class="avatar ai-av">AI</div>' +
        '<div class="typing-bubble">' +
          '<span></span><span></span><span></span>' +
        '</div>' +
      '</div>';
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    var el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function setStatus(state) {
    if (state === 'thinking') {
      statusDot.className = 'status-dot thinking';
      statusText.textContent = 'Thinking...';
      sendBtn.disabled = true;
    } else {
      statusDot.className = 'status-dot';
      statusText.textContent = 'Ready';
      sendBtn.disabled = false;
    }
  }

  function showError(msg) {
    var t = document.getElementById('errToast');
    t.textContent = '⚠ ' + msg;
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 4000);
  }

  function scrollBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  function sendMessage() {
    if (isWaiting) return;

    var text = inputEl.value.trim();
    if (!text) return;

    appendMsg('user', text, nowStr());

    inputEl.value = '';
    inputEl.style.height = 'auto';

    isWaiting = true;
    setStatus('thinking');
    showTyping();

    var url = '/message?' + encodeURIComponent(text);

    fetch(url, { method: 'GET' })
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function(reply) {
        hideTyping();
		if (reply.indexOf("data:image")!=-1)
			appendMsg('ai', reply, nowStr(), true);
		else
			appendMsg('ai', reply, nowStr());
      })
      .catch(function(err) {
        hideTyping();
        showError('無法連線至裝置 (' + err.message + ')');
      })
      .finally(function() {
        isWaiting = false;
        setStatus('ready');
        inputEl.focus();
      });
  }
</script>
</body>
</html>
